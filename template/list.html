{{ define "body" }}
{{ if .IsFiltered }}
    <p class="filter">{ {{ .FilteredTag.Name }} } 태그가 들어간 글</p>
{{ else }}
    <p class="filter">모든 글</p>
{{ end }}

<div class ="list">
    {{ range .Posts }}
        <a class="nodeco" href="{{ .ID }}.html">
            <span class="title">
                {{ .Title }}
            </span>
            <span class="date">
                {{ .Time.Format "2006-1-2" }}
            </span>
        </a></br>
    {{ end }}
</div>
{{ end }}
