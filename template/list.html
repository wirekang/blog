{{ define "body" }}
<div id ="post-list">
{{ if .IsFiltered }}
    <p class="filter c-2"><b> {{ .FilteredTag.Name }} </b> 태그가 포함된 글</p>
{{ else }}
    <p class="filter c-2">모든 글</p>
{{ end }}

    {{ range .Posts }}
        {{ template "post" .}}
    {{ end }}
</div>
<div class="hidden">
</div>
{{ end }}
