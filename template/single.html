{{ define "body" }}
<div class="single">
    <div class="title">
        <a class="nodeco" href="{{ .Post.ID }}.html">{{ .Post.Title }}</a>
    </div>
    <div class="tag">
        {{ range .Post.Tags }}
            <a class="nodeco" href ="tag{{ .ID }}.html">#{{ .Name }}</a>
        {{ end }}
    </div>

    {{ .HTML }}
</div>
<div class="related">
    <p class="filter">관련된 글</p>
    {{ range .RelatedPosts }}
        {{ template "post" .}}
    {{ end }}
</div>
{{ end }}
